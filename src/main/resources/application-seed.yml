# =====================================================================
# 로컬 전용 프로파일 (`--spring.profiles.active=seed`)
# 쿠팡 실 키 없이 대시보드를 눈으로 확인하기 위한 개발 설정.
# ⚠️ 운영에서는 절대 사용 금지. 이 키/포트는 로컬 데모 전용이다.
# =====================================================================
server:
  # 로컬에서 8080 이 자주 쓰여 충돌나므로 8088 로 띄운다.
  port: 8088

app:
  encryption:
    # 로컬 시드 전용 개발 키(= base64('seed-dev-key-32-bytes-local-only'), 32 byte).
    # 운영 키는 반드시 환경변수 APP_ENCRYPTION_KEY 로 주입한다.
    key: c2VlZC1kZXYta2V5LTMyLWJ5dGVzLWxvY2FsLW9ubHk=
