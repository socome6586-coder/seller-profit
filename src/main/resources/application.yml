server:
  # Caddy(운영) 뒤에서 X-Forwarded-Proto 를 신뢰해 request.isSecure() 가 정확히 동작하게 한다.
  # (자동로그인 쿠키의 Secure 플래그가 이 값을 기준으로 결정됨 — AuthController 참고)
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        http-only: true
        # SameSite=Lax — 같은 오리진 SPA 라 대부분 요청에 문제 없고, 크로스사이트 POST(CSRF)로
        # 세션 쿠키가 실려 나가는 걸 막는 최소한의 방어선이 된다. 이메일 링크로 들어오는 GET 최초
        # 진입(Top-level navigation)은 Lax 에서도 정상 동작(Strict 는 이 경우까지 막아 더 엄격하다).
        same-site: lax
        # secure(HTTPS 전용) 는 여기서 강제하지 않는다 — 로컬 seed 프로파일은 평문 HTTP(8088)라
        # secure=true 로 고정하면 로컬 로그인이 아예 안 된다. 운영은 docker-compose.prod.yml 의
        # SERVER_SERVLET_SESSION_COOKIE_SECURE=true 환경변수로 별도 강제한다.

spring:
  application:
    name: seller-profit

  mail:
    # 비밀번호 재설정 메일 발송용 SMTP. username/password 미설정(빈 문자열)이면
    # EmailService 가 실제 발송 대신 로그로만 남긴다(플레이스홀더-세이프, toss.billing 과 동일 패턴).
    #   Gmail 예: host=smtp.gmail.com, port=587, username=본인 Gmail 주소,
    #             password=Gmail "앱 비밀번호"(일반 로그인 비밀번호 아님 — 구글 계정 설정 > 보안 > 2단계 인증 > 앱 비밀번호).
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    # 호스트 5432 는 다른 프로젝트(lightdrone-pg)가 쓰므로 셀러는 5433 사용.
    # 필요 시 DB_HOST / DB_PORT 환경변수로 덮어쓸 수 있다.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/seller_profit
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      # 스키마는 Flyway 가 관리. JPA 는 엔티티↔테이블 정합성 '검증'만 한다.
      # 혹시 검증이 막히면 임시로 'none' 으로 두고 원인을 본 뒤 되돌릴 것.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  encryption:
    # Base64 인코딩된 32 byte(AES-256) 키. 반드시 환경변수로 주입, 절대 커밋 금지.
    # 생성: openssl rand -base64 32
    key: ${APP_ENCRYPTION_KEY}
  # 관리자 부트스트랩. 콤마로 구분된 이메일 목록(공백 무시) — 로그인 시 해당 이메일 계정을 ADMIN 으로 승격.
  # 시크릿처럼 다룬다: 실제 값은 반드시 환경변수로만 주입하고 절대 커밋하지 않는다(기본값은 빈 문자열).
  admin-emails: ${APP_ADMIN_EMAILS:}
  # 운영 서버 공인 IP — 쿠팡 OPEN API 키 발급 시 "IP 주소" 등록에 필요(계정 연동 가이드,
  # docs/onboarding-tasks.md §2). 프론트가 GET /api/config 로 받아 표시하므로, 서버 이전 시
  # 이 값(또는 배포 환경변수 APP_PUBLIC_SERVER_IP) 한 곳만 바꾸면 전체 가이드 문구가 갱신된다 —
  # 절대 프론트 코드에 이 IP 를 문자열로 흩뿌리지 않는다.
  public-server-ip: ${APP_PUBLIC_SERVER_IP:49.247.139.234}
  # 비밀번호 재설정 이메일 안의 링크가 가리킬 프론트 주소. 로컬은 seed 프로파일 포트(8088),
  # 운영은 반드시 실 도메인으로 덮어써야 한다(.env.production 의 APP_FRONTEND_BASE_URL).
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:8088}
  mail:
    # 미설정이면 spring.mail.username 을 그대로 발신자로 쓴다(둘 다 없으면 아래 기본값).
    from: ${MAIL_FROM:${MAIL_USERNAME:noreply@sellerprofit.co.kr}}

toss:
  billing:
    # 토스페이먼츠 빌링(정기결제) 키. 실 키는 반드시 환경변수로 주입, 절대 커밋 금지.
    # 미설정(placeholder)이면 결제 호출이 차단된다(요금 카탈로그/무료 가입은 정상 동작).
    #   발급: 토스 개발자센터 > API 키 (테스트/라이브). secret-key 만 서버가 사용.
    secret-key: ${TOSS_SECRET_KEY:test_sk_PLACEHOLDER}
    base-url: ${TOSS_BASE_URL:https://api.tosspayments.com}

coupang:
  base-url: https://api-gateway.coupang.com
  # 발주서 목록 1페이지 최대 건수. 페이징은 nextToken 으로 이어받는다.
  max-per-page: 50
  # 스케줄러 1회 수집 시 거슬러 올라갈 일 수 (마지막 동기화 시각이 없을 때의 기본 조회 범위).
  default-lookback-days: 7
  # 정산은 판매보다 늦게 확정되므로 더 넉넉히 거슬러 본다.
  settlement-lookback-days: 14
  # 반품은 접수 후 상태가 바뀌므로(회수중→완료) 넉넉히 거슬러 재확인한다.
  return-lookback-days: 14

logging:
  level:
    org.hibernate.SQL: debug
