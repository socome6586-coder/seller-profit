<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>셀러 순이익 대시보드</title>
  <style>
    :root {
      --bg: #0f1216; --panel: #171c22; --line: #262d36;
      --text: #e6e9ee; --muted: #8b95a3;
      --loss: #ff5d5d; --loss-bg: #2a1518; --profit: #34d399; --accent: #4f8cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
      padding: 28px 20px 60px;
    }
    .wrap { max-width: 1040px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
    .controls {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 20px;
    }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 11px; color: var(--muted); }
    .field input {
      background: #0d1115; border: 1px solid var(--line); color: var(--text);
      border-radius: 8px; padding: 8px 10px; font-size: 14px; min-width: 120px;
    }
    button {
      background: var(--accent); color: #fff; border: 0; border-radius: 8px;
      padding: 9px 18px; font-size: 14px; cursor: pointer; font-weight: 600;
    }
    button:hover { filter: brightness(1.08); }
    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
    .card .k { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .card .v { font-size: 22px; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; background: var(--panel);
      border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
    th, td { padding: 12px 14px; text-align: right; font-size: 14px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-weight: 600; font-size: 12px; background: #131820; }
    th:first-child, td:first-child { text-align: left; }
    tr:last-child td { border-bottom: 0; }
    tr.loss td { background: var(--loss-bg); }
    .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 999px; margin-left: 8px; background: var(--loss); color: #fff; }
    .pos { color: var(--profit); } .neg { color: var(--loss); }
    .muted { color: var(--muted); }
    #error { color: var(--loss); margin: 14px 0; font-size: 14px; display: none; }
    .empty { text-align: center; color: var(--muted); padding: 30px; }
    select { background: #0d1115; border: 1px solid var(--line); color: var(--text);
      border-radius: 8px; padding: 8px 10px; font-size: 14px; min-width: 120px; }
    h2 { font-size: 16px; margin: 32px 0 12px; }
    .manage { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
    .panel h3 { margin: 0 0 12px; font-size: 14px; }
    .panel .field { margin-bottom: 10px; }
    .panel .field input, .panel .field select { width: 100%; }
    .note { font-size: 12px; margin-top: 8px; min-height: 16px; }
    .note.ok { color: var(--profit); } .note.err { color: var(--loss); }
    .cost-list { margin-top: 14px; font-size: 13px; color: var(--muted); }
    .cost-list div { padding: 5px 0; border-top: 1px solid var(--line); }
    @media (max-width: 720px) { .manage { grid-template-columns: 1fr; } }
    .bar { display: inline-block; vertical-align: middle; height: 8px; border-radius: 999px;
      background: var(--accent); margin-left: 8px; min-width: 2px; }
    .bar-wrap { display: inline-flex; align-items: center; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>셀러 순이익 대시보드</h1>
  <div class="sub">정산 실수령 − 원가 − 배분된 기타비용 = 진짜 순이익. 적자 상품이 맨 위로 올라옵니다.</div>

  <div class="controls">
    <div class="field">
      <label>마켓 계정 ID</label>
      <input id="accountId" type="number" value="1" />
    </div>
    <div class="field">
      <label>시작일 (선택)</label>
      <input id="from" type="date" />
    </div>
    <div class="field">
      <label>종료일 (선택)</label>
      <input id="to" type="date" />
    </div>
    <button id="load">조회</button>
  </div>

  <div id="error"></div>

  <div class="cards">
    <div class="card"><div class="k">총매출 (정산 실수령)</div><div class="v" id="c-revenue">–</div></div>
    <div class="card"><div class="k">총순이익</div><div class="v" id="c-profit">–</div></div>
    <div class="card"><div class="k">평균 마진율</div><div class="v" id="c-margin">–</div></div>
    <div class="card"><div class="k">배분 기타비용</div><div class="v" id="c-cost">–</div></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>상품</th><th>매출</th><th>수량</th><th>반품</th><th>원가</th>
        <th>배분비용</th><th>순이익</th><th>마진율</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="8" class="empty">「조회」를 눌러 데이터를 불러오세요.</td></tr>
    </tbody>
  </table>

  <h2>반품 사유 분석 <span id="reason-total" class="muted" style="font-size:12px;font-weight:400"></span></h2>
  <table>
    <thead>
      <tr><th>반품 사유</th><th>반품수량</th><th>건수</th><th>비중</th></tr>
    </thead>
    <tbody id="reason-rows">
      <tr><td colspan="4" class="empty">「조회」를 눌러 데이터를 불러오세요.</td></tr>
    </tbody>
  </table>

  <h2>입력 / 관리</h2>
  <div class="manage">
    <div class="panel">
      <h3>상품 원가(COGS) 입력</h3>
      <div class="field">
        <label>상품 선택</label>
        <select id="cogs-product"></select>
      </div>
      <div class="field">
        <label>매입원가 (개당, 원)</label>
        <input id="cogs-value" type="number" min="0" step="1" placeholder="예: 3000" />
      </div>
      <button id="cogs-save">원가 저장</button>
      <div class="note" id="cogs-note"></div>
    </div>

    <div class="panel">
      <h3>기타비용 입력 (기간 총액)</h3>
      <div class="field">
        <label>유형</label>
        <select id="cost-type">
          <option value="AD">광고비 (AD)</option>
          <option value="SHIPPING">배송비 (SHIPPING)</option>
          <option value="ETC">기타 (ETC)</option>
        </select>
      </div>
      <div class="field">
        <label>금액 (원)</label>
        <input id="cost-amount" type="number" min="0" step="1" placeholder="예: 50000" />
      </div>
      <div class="field">
        <label>시작일</label>
        <input id="cost-start" type="date" />
      </div>
      <div class="field">
        <label>종료일</label>
        <input id="cost-end" type="date" />
      </div>
      <div class="field">
        <label>메모 (선택)</label>
        <input id="cost-memo" type="text" placeholder="예: 6월 광고비" />
      </div>
      <button id="cost-save">비용 추가</button>
      <div class="note" id="cost-note"></div>
      <div class="cost-list" id="cost-list"></div>
    </div>
  </div>
</div>

<script>
  const won = (n) => (n == null ? "–" : "₩" + Number(n).toLocaleString("ko-KR"));
  const pct = (n) => (n == null ? "–" : Number(n).toFixed(1) + "%");
  const signClass = (n) => (Number(n) < 0 ? "neg" : "pos");

  async function load() {
    const accountId = document.getElementById("accountId").value || "1";
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;
    const err = document.getElementById("error");
    err.style.display = "none";

    const params = new URLSearchParams({ accountId });
    if (from) params.set("from", from);
    if (to) params.set("to", to);

    try {
      const res = await fetch("/api/dashboard/profit?" + params.toString());
      if (!res.ok) throw new Error("HTTP " + res.status + " — " + (await res.text()));
      render(await res.json());
    } catch (e) {
      err.textContent = "불러오기 실패: " + e.message;
      err.style.display = "block";
    }
  }

  function render(d) {
    document.getElementById("c-revenue").textContent = won(d.totalRevenue);
    const p = document.getElementById("c-profit");
    p.textContent = won(d.totalProfit);
    p.className = "v " + signClass(d.totalProfit);
    document.getElementById("c-margin").textContent = pct(d.avgMarginPct);
    document.getElementById("c-cost").textContent = won(d.totalAllocatedCost);

    const tbody = document.getElementById("rows");
    const items = d.products || [];
    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">해당 기간 데이터가 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = items.map((it) => `
      <tr class="${it.loss ? "loss" : ""}">
        <td>${escapeHtml(it.name)}${it.loss ? '<span class="badge">적자</span>' : ""}</td>
        <td>${won(it.revenue)}</td>
        <td>${Number(it.units).toLocaleString("ko-KR")}</td>
        <td class="${Number(it.returnedUnits) > 0 ? "neg" : "muted"}">${Number(it.returnedUnits).toLocaleString("ko-KR")}</td>
        <td>${won(it.cogsTotal)}</td>
        <td>${won(it.allocatedCost)}</td>
        <td class="${signClass(it.profit)}">${won(it.profit)}</td>
        <td class="${signClass(it.profit)}">${pct(it.marginPct)}</td>
      </tr>`).join("");
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  // ---- 반품 사유 분석 -------------------------------------------------------
  async function loadReturns() {
    const accountId = document.getElementById("accountId").value || "1";
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;
    const params = new URLSearchParams({ accountId });
    if (from) params.set("from", from);
    if (to) params.set("to", to);
    try {
      const res = await fetch("/api/dashboard/returns?" + params.toString());
      if (!res.ok) throw new Error("HTTP " + res.status);
      renderReasons(await res.json());
    } catch (e) {
      document.getElementById("reason-rows").innerHTML =
        '<tr><td colspan="4" class="empty">반품 통계 불러오기 실패</td></tr>';
    }
  }

  function renderReasons(d) {
    const total = document.getElementById("reason-total");
    total.textContent = "총 반품 " + Number(d.totalQuantity || 0).toLocaleString("ko-KR") + "개";
    const tbody = document.getElementById("reason-rows");
    const items = d.reasons || [];
    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">해당 기간 반품이 없습니다.</td></tr>';
      return;
    }
    const maxShare = Math.max(...items.map((it) => Number(it.sharePct) || 0), 1);
    tbody.innerHTML = items.map((it) => {
      const share = Number(it.sharePct) || 0;
      const w = Math.round((share / maxShare) * 120);
      return `
      <tr>
        <td>${escapeHtml(it.reason)}</td>
        <td>${Number(it.quantity).toLocaleString("ko-KR")}</td>
        <td>${Number(it.lineCount).toLocaleString("ko-KR")}</td>
        <td><span class="bar-wrap">${share.toFixed(1)}%<span class="bar" style="width:${w}px"></span></span></td>
      </tr>`;
    }).join("");
  }

  // ---- 입력 / 관리 ----------------------------------------------------------
  const $ = (id) => document.getElementById(id);
  const acct = () => $("accountId").value || "1";

  async function apiError(res) {
    try { const j = await res.json(); return j.error || ("HTTP " + res.status); }
    catch { return "HTTP " + res.status; }
  }

  function setNote(id, ok, msg) {
    const n = $(id);
    n.className = "note " + (ok ? "ok" : "err");
    n.textContent = msg;
  }

  async function loadProducts() {
    const sel = $("cogs-product");
    try {
      const res = await fetch("/api/products?accountId=" + acct());
      if (!res.ok) throw new Error(await apiError(res));
      const items = await res.json();
      sel.innerHTML = items.length === 0
        ? '<option value="">상품 없음</option>'
        : items.map((p) => `<option value="${p.id}">${escapeHtml(p.name)} ${
            p.cogs == null ? "(원가 미입력)" : "(₩" + Number(p.cogs).toLocaleString("ko-KR") + ")"
          }</option>`).join("");
    } catch (e) {
      sel.innerHTML = '<option value="">불러오기 실패</option>';
    }
  }

  async function saveCogs() {
    const id = $("cogs-product").value;
    const cogs = $("cogs-value").value;
    if (!id) return setNote("cogs-note", false, "상품을 선택하세요.");
    if (cogs === "") return setNote("cogs-note", false, "원가를 입력하세요.");
    try {
      const res = await fetch("/api/products/" + id + "/cogs", {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ cogs: Number(cogs) }),
      });
      if (!res.ok) throw new Error(await apiError(res));
      setNote("cogs-note", true, "저장됐습니다. 대시보드를 갱신합니다.");
      await loadProducts();
      await load();
    } catch (e) {
      setNote("cogs-note", false, "실패: " + e.message);
    }
  }

  async function loadCosts() {
    const box = $("cost-list");
    try {
      const res = await fetch("/api/costs?accountId=" + acct());
      if (!res.ok) throw new Error(await apiError(res));
      const items = await res.json();
      box.innerHTML = items.length === 0
        ? "등록된 비용이 없습니다."
        : items.map((c) => `<div>${c.periodStart} ~ ${c.periodEnd} · ${c.costType} · ₩${
            Number(c.amount).toLocaleString("ko-KR")
          }${c.memo ? " · " + escapeHtml(c.memo) : ""}</div>`).join("");
    } catch (e) {
      box.innerHTML = "비용 목록 불러오기 실패";
    }
  }

  async function saveCost() {
    const body = {
      accountId: Number(acct()),
      costType: $("cost-type").value,
      amount: Number($("cost-amount").value),
      periodStart: $("cost-start").value,
      periodEnd: $("cost-end").value,
      memo: $("cost-memo").value || null,
    };
    if (!$("cost-amount").value || !body.periodStart || !body.periodEnd) {
      return setNote("cost-note", false, "금액·시작일·종료일을 입력하세요.");
    }
    try {
      const res = await fetch("/api/costs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(await apiError(res));
      setNote("cost-note", true, "추가됐습니다. 대시보드를 갱신합니다.");
      $("cost-amount").value = "";
      $("cost-memo").value = "";
      await loadCosts();
      await load();
    } catch (e) {
      setNote("cost-note", false, "실패: " + e.message);
    }
  }

  function refreshAll() { load(); loadReturns(); loadProducts(); loadCosts(); }

  $("load").addEventListener("click", refreshAll);
  $("cogs-save").addEventListener("click", saveCogs);
  $("cost-save").addEventListener("click", saveCost);
  refreshAll(); // 첫 진입 시 자동 조회
</script>
</body>
</html>
