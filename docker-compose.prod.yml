# 운영 배포용 Compose. 로컬 개발용 docker-compose.yml 과 별도로 관리한다.
#
# 사용법 (서버에서):
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#
# `.env.production` 은 이 저장소에 커밋하지 않는다(.gitignore 처리됨) — 실제 값은
# `.env.production.example` 을 복사해 서버에서 직접 채운다.
#
# 절대 규칙(docs/deploy-tasks.md 참고):
#   - SPRING_PROFILES_ACTIVE 에 `seed` 금지(로컬 데모 전용 프로파일).
#   - 시크릿은 이 파일에 하드코딩하지 않고 전부 .env.production 에서 주입한다.

# 프로젝트명을 고정 — 지정하지 않으면 디렉터리명(seller-profit)이 기본값이 되어
# 로컬 개발용 docker-compose.yml(같은 디렉터리에서 실행 시)과 네트워크/볼륨 이름이
# 겹칠 수 있다(로컬 검증 중 실제로 확인됨: 두 스택의 default 네트워크가 공유됨).
name: seller-profit-prod

services:
  postgres:
    image: postgres:16
    container_name: seller-profit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: seller_profit
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d seller_profit"]
      interval: 5s
      timeout: 3s
      retries: 10
    # 외부에 포트를 열지 않는다 — app 컨테이너만 내부 네트워크로 접근.

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seller-profit-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      APP_ADMIN_EMAILS: ${APP_ADMIN_EMAILS}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-test_sk_PLACEHOLDER}
      TOSS_BASE_URL: ${TOSS_BASE_URL:-https://api.tosspayments.com}
      # 비밀번호 재설정 메일. 미설정(빈 값)이면 EmailService 가 실제 발송 대신 서버 로그로만 남긴다.
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_CONTACT_TO: ${MAIL_CONTACT_TO:-socome6586@gmail.com}
      # 재설정 이메일 링크가 가리킬 실 도메인. 운영에선 반드시 https://sellerprofit.co.kr 로 설정.
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-https://sellerprofit.co.kr}
      # 비워두거나 prod 만 허용. seed 를 여기 넣지 않는다.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      # KR1-Lite(RAM 1~2GB, 스왑 2GB) 대응 — Postgres/Caddy 와 공존할 수 있게 힙 상한을 둔다.
      JAVA_TOOL_OPTIONS: ${APP_JAVA_OPTS:--Xmx384m -XX:MaxMetaspaceSize=128m}
      # 보안 감사(2026-07) 후속 조치 — 운영은 HTTPS(Caddy) 뒤이므로 세션 쿠키를 Secure 전용으로 강제한다.
      # (application.yml 은 로컬 seed 프로파일과 공유돼 여기서만 켠다 — 로컬은 평문 HTTP 라 켜면 로그인 자체가 깨짐.)
      SERVER_SERVLET_SESSION_COOKIE_SECURE: "true"
      # 운영 로그에 SQL 구조가 상시 노출/누적되지 않게 낮춘다(로컬 개발은 application.yml 기본값 debug 유지).
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: WARN

  caddy:
    image: caddy:2-alpine
    container_name: seller-profit-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
